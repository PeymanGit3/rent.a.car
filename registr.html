<body class="register">

      <!-- HEADER -->
  <header class="header">
    <div class="container header-inner">
      <h2 class="logo"><a href="./index.html">MORENT</a></h2>
      <button class="btn-primary"><a href="./registr.html">რეგისტრაცია</a></button>
    </div>
  </header>


  <section class="register-section">

  <div class="register-container">

    <!-- SOL TARAF -->
    <div class="register-left">
      

      <form>

        <input type="tel" placeholder="ტელეფონის ნომერი" required>
        <input type="text" placeholder="სახელი" required>
        <input type="text" placeholder="გვარი" required>
        <input type="email" placeholder="მეილი" required>
        <input type="password" placeholder="პაროლი" required>

        <button type="submit">რეგისტრაცია</button>

      </form>

      <a href="#" class="login-link">
        უკვე ავტორიზებული ხართ? შედით თქვენი ანგარიშით
      </a>

    </div>


    <!-- SAĞ TARAF -->
    <div class="register-right">
      <img src="imgs/forreg.jpeg" alt="Car Image">
    </div>

  </div>

</section>
